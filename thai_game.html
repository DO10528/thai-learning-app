<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมจับคู่ภาพภาษาไทย</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-app">
        <header class="game-header">
            <button class="back-btn" onclick="window.location.href='index.html'">← กลับ</button>
            <h1 class="game-title">เกมจับคู่ภาพภาษาไทย</h1>
            <div class="score-display">
                <span class="score-label">คะแนน:</span>
                <span class="score-value" id="score">0</span>
            </div>
        </header>

        <div id="start-screen" class="screen active">
            <div class="start-content">
                <h2 class="welcome-text">สวัสดีจ้า!</h2>
                <p class="instruction-text">เลือกระดับความยากที่ต้องการเล่นกันเถอะ!</p>
                
                <div class="level-buttons">
                    <button class="level-btn" data-level="1">
                        <span class="level-number">ระดับ 1</span>
                        <span class="level-desc">2 ตัวเลือก</span>
                    </button>
                    <button class="level-btn" data-level="2">
                        <span class="level-number">ระดับ 2</span>
                        <span class="level-desc">3 ตัวเลือก</span>
                    </button>
                    <button class="level-btn" data-level="3">
                        <span class="level-number">ระดับ 3</span>
                        <span class="level-desc">4 ตัวเลือก</span>
                    </button>
                </div>

                <div class="category-buttons">
                    <button class="category-btn active" data-category="consonants">พยัญชนะไทย</button>
                    <button class="category-btn" data-category="vowels">สระ</button>
                    <button class="category-btn" data-category="finals">ตัวสะกด</button>
                </div>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
                <span class="progress-text" id="progress-text">1 / 10</span>
            </div>

            <div class="question-area">
                <button class="listen-btn" id="listen-btn">
                    <span class="listen-icon">🔊</span>
                    <span class="listen-text">ฟังอีกครั้ง</span>
                </button>
            </div>

            <div class="options-grid" id="options-grid"></div>
        </div>

        <div id="result-screen" class="screen">
            <div class="result-content">
                <h2 class="result-title">เสร็จสิ้น!</h2>
                <div class="final-score">
                    <span class="final-score-label">คะแนนรวม:</span>
                    <span class="final-score-value" id="final-score">0</span>
                </div>
                <div class="result-stars" id="result-stars"></div>
                <div class="result-buttons">
                    <button class="result-btn" id="play-again-btn">เล่นอีกครั้ง</button>
                    <button class="result-btn" id="back-to-menu-btn">กลับเมนู</button>
                </div>
            </div>
        </div>

        <div id="confetti-container"></div>
    </div>

    <script src="js/thai_data.js"></script>
    <script src="js/audio_manager.js"></script>
    <script src="js/game_manager.js"></script>
</body>
</html>
